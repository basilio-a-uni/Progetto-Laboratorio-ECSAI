<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars Base | Operations Dashboard</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #ea580c; /* Mars Orange */
            --ok-color: #10b981;
            --warn-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Layout a griglia per i widget */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .widget {
            background-color: var(--panel-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border-top: 4px solid var(--text-muted);
            transition: all 0.2s ease;
        }

        /* Colori dinamici basati sullo status */
        .widget.status-ok { border-top-color: var(--ok-color); }
        .widget.status-warning { border-top-color: var(--warn-color); }
        
        /* Animazione flash quando si aggiorna */
        .widget.update-flash { background-color: #334155; }

        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .widget-title {
            font-size: 1.1em;
            font-weight: bold;
            word-break: break-all;
            color: var(--accent);
        }

        .widget-type {
            font-size: 0.75em;
            background: #334155;
            padding: 3px 8px;
            border-radius: 12px;
            text-transform: uppercase;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-family: monospace;
            font-size: 1.1em;
        }

        .metric-name { color: var(--text-muted); }
        .metric-value { font-weight: bold; }
        .metric-unit { color: var(--text-muted); font-size: 0.8em; margin-left: 4px; }
        .timestamp { font-size: 0.7em; color: #64748b; margin-top: 15px; text-align: right; }
    </style>
</head>
<body>

    <header>
        <h1>🚀 Mars Base Operations</h1>
        <p style="color: var(--text-muted); margin-top: 5px;">Real-Time Telemetry & Sensor Dashboard</p>
    </header>

    <div class="dashboard-grid" id="dashboard">
        </div>

    <script>
        const socket = io();
        const dashboard = document.getElementById('dashboard');

        // Ascoltiamo l'evento inviato da Flask
        socket.on('telemetry_update', function(data) {
            
            // Creiamo un ID sicuro per HTML basato sul source_id
            const safeId = 'widget-' + data.source_id.replace(/[^a-zA-Z0-9]/g, '-');
            let widget = document.getElementById(safeId);

            // Se il widget non esiste ancora, lo creiamo e lo aggiungiamo alla griglia
            if (!widget) {
                widget = document.createElement('div');
                widget.id = safeId;
                dashboard.appendChild(widget);
            }

            // Impostiamo la classe CSS in base allo status (ok o warning)
            const statusClass = data.status === 'ok' ? 'status-ok' : 'status-warning';
            widget.className = `widget ${statusClass}`;

            // Creiamo l'HTML per le singole metriche iterando l'array "metrics" dello schema
            let metricsHTML = data.metrics.map(m => `
                <div class="metric-row">
                    <span class="metric-name">${m.name}</span>
                    <span>
                        <span class="metric-value">${typeof m.value === 'number' ? m.value.toFixed(2) : m.value}</span>
                        <span class="metric-unit">${m.unit}</span>
                    </span>
                </div>
            `).join('');

            // Estraiamo solo l'orario dal timestamp
            const timeString = new Date(data.timestamp).toLocaleTimeString();

            // Costruiamo il contenuto completo del widget
            widget.innerHTML = `
                <div class="widget-header">
                    <span class="widget-title">${data.source_id.split('/').pop()}</span>
                    <span class="widget-type">${data.source_type}</span>
                </div>
                <div class="metrics-container">
                    ${metricsHTML}
                </div>
                <div class="timestamp">Last Update: ${timeString}</div>
            `;

            // Effetto visivo rapido per far capire all'utente che il dato si è aggiornato
            widget.classList.add('update-flash');
            setTimeout(() => widget.classList.remove('update-flash'), 200);
        });

        socket.on('connect', () => console.log('Connesso al Server Flask!'));
        socket.on('disconnect', () => console.log('Disconnesso dal Server Flask.'));
    </script>
</body>
</html>
